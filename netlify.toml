# netlify.toml
# Konfiguration für ComplianceAI auf Netlify
# Datei muss im Root-Verzeichnis liegen (neben index.html)

[build]
  publish = "."                          # index.html liegt im Root
  functions = "netlify/functions"       # Serverless functions Ordner

# URL-Weiterleitung: /api/claude → Netlify Function
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

# HTTPS erzwingen
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
